<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Pick-em Modal — Placeholder</title>
  <style>
    /*
      PLACEHOLDER. Intentionally minimal — Claude Design will replace this
      file with the polished bunkhouse art. Job here: prove the data contract
      end-to-end so the engine can drive a complete pick-em round.

      Contract recap (see design-briefs/pickem-modal.md):
        in:  postMessage {type:'init', payload:PickEmConfig}
        out: postMessage {type:'pick_revealed', payload:PickEvent}
             postMessage {type:'round_complete', payload:RoundComplete}

      The `items` array is the predetermined reveal sequence in TAP ORDER —
      items[0] is what the player's first tap reveals, regardless of which
      physical door they touched. Class III "illusion of choice."
    */
    :root {
      --bg: #1a1410;
      --panel: #221913;
      --text: #ede4d3;
      --muted: #a08c70;
      --accent: #d4a256;
      --door: #3b2a1e;
      --door-edge: #5a4030;
      --door-revealed: #2a201a;
      --collect: #6b1d1d;
      --multiplier: #8a5a1f;
      --plus-one: #1f6b3a;
      --shadow: rgba(0,0,0,0.4);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      overflow: hidden;
    }
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
      max-width: 480px;
      margin: 0 auto;
    }
    .pm-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 2px;
      margin: 4px 0 12px;
      text-align: center;
    }
    .pm-header {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 8px 12px;
      background: var(--panel);
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 14px;
    }
    .pm-stat-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .pm-stat-value {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
    }
    .pm-multiplier-badge {
      display: inline-block;
      padding: 2px 8px;
      background: var(--multiplier);
      color: #fff;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 700;
      margin-left: 6px;
      visibility: hidden;
    }
    .pm-multiplier-badge.active { visibility: visible; }

    .pm-grid {
      width: 100%;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }
    .pm-door {
      aspect-ratio: 1 / 1;
      background: var(--door);
      border: 2px solid var(--door-edge);
      border-radius: 6px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 24px;
      font-weight: 700;
      color: var(--accent);
      transition: background 200ms, border-color 200ms, opacity 200ms;
      position: relative;
      min-height: 64px;
      padding: 4px;
      text-align: center;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .pm-door:hover:not(.revealed):not(.disabled) {
      border-color: var(--accent);
    }
    .pm-door:focus { outline: 3px solid var(--accent); outline-offset: 2px; }
    .pm-door.disabled { cursor: not-allowed; opacity: 0.5; }
    .pm-door.revealed {
      background: var(--door-revealed);
      cursor: default;
      opacity: 0.85;
    }
    .pm-door .number {
      position: absolute;
      top: 4px;
      left: 6px;
      font-size: 10px;
      color: var(--muted);
      font-weight: 400;
    }
    .pm-door .content {
      font-size: 11px;
      line-height: 1.2;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .pm-door .content .amount {
      font-size: 16px;
      display: block;
      margin-top: 2px;
    }
    .pm-door.kind-credit .content { color: var(--accent); }
    .pm-door.kind-collect { background: var(--collect); border-color: #b04040; }
    .pm-door.kind-collect .content { color: #fff; }
    .pm-door.kind-multiplier { background: var(--multiplier); border-color: #d49a3a; }
    .pm-door.kind-multiplier .content { color: #fff; }
    .pm-door.kind-plus-one { background: var(--plus-one); border-color: #3aa05a; }
    .pm-door.kind-plus-one .content { color: #fff; }

    .pm-footer {
      width: 100%;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
      padding: 8px;
    }
    .pm-complete {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
      visibility: hidden;
      opacity: 0;
      transition: opacity 300ms;
    }
    .pm-complete.show { visibility: visible; opacity: 1; }
    .pm-complete-title {
      font-size: 28px;
      color: var(--accent);
      font-weight: 700;
      margin-bottom: 12px;
    }
    .pm-complete-amount {
      font-size: 40px;
      color: var(--text);
      font-weight: 700;
      margin-bottom: 8px;
    }
    .pm-complete-reason {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }
    .pm-live-region {
      position: absolute;
      width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0,0,0,0);
      white-space: nowrap; border: 0;
    }
    @media (prefers-reduced-motion: reduce) {
      .pm-door, .pm-complete { transition: none !important; }
    }
  </style>
</head>
<body>
  <h1 class="pm-title" id="pm-theme-title">PICK-EM</h1>

  <div class="pm-header">
    <div>
      <div class="pm-stat-label">Picks Left</div>
      <div class="pm-stat-value" id="pm-picks-left">—</div>
    </div>
    <div>
      <div class="pm-stat-label">Won</div>
      <div class="pm-stat-value">
        <span id="pm-running-total">$0.00</span>
        <span class="pm-multiplier-badge" id="pm-multiplier-badge">2×</span>
      </div>
    </div>
  </div>

  <div class="pm-grid" id="pm-grid" role="grid" aria-label="Pick a door"></div>

  <div class="pm-footer">
    Placeholder — Claude Design will replace this with the themed art.
  </div>

  <div class="pm-complete" id="pm-complete" role="status" aria-live="polite">
    <div class="pm-complete-title">ROUND COMPLETE</div>
    <div class="pm-complete-amount" id="pm-complete-amount">$0.00</div>
    <div class="pm-complete-reason" id="pm-complete-reason"></div>
  </div>

  <div class="pm-live-region" id="pm-live" aria-live="polite"></div>

  <script>
  (function () {
    'use strict';

    // ─── Data-contract types (mirror design-briefs/pickem-modal.md) ─────────
    /** @typedef {{type:'credit',value_cents:number}
     *         | {type:'pick_plus_one'}
     *         | {type:'multiplier_2x'}
     *         | {type:'collect'}} PickEmItem */
    /** @typedef {{spinId:string, themeId:string, picksAwarded:5|7|9,
     *             betCents:number, items:PickEmItem[],
     *             themeTitle:string, audioEnabled?:boolean}} PickEmConfig */

    // ─── State ───────────────────────────────────────────────────────────────
    /** @type {PickEmConfig|null} */ let config = null;
    let revealIndex = 0;          // 0..items.length-1 — points at items[revealIndex]
    let remainingPicks = 0;
    let multiplier = 1;
    let runningTotalCents = 0;
    let pickHistory = [];
    let doneInit = false;
    let roundEnded = false;
    /** @type {Array<{itemRevealed:PickEmItem|null, picked:boolean}>} */
    let slots = [];

    // ─── DOM helpers ─────────────────────────────────────────────────────────
    const $grid = document.getElementById('pm-grid');
    const $picksLeft = document.getElementById('pm-picks-left');
    const $runTotal = document.getElementById('pm-running-total');
    const $multBadge = document.getElementById('pm-multiplier-badge');
    const $title = document.getElementById('pm-theme-title');
    const $complete = document.getElementById('pm-complete');
    const $completeAmount = document.getElementById('pm-complete-amount');
    const $completeReason = document.getElementById('pm-complete-reason');
    const $live = document.getElementById('pm-live');

    function fmt(cents) {
      const c = Math.round(cents);
      const dollars = Math.floor(c / 100);
      const rem = c % 100;
      return rem === 0 ? `$${dollars}` : `$${dollars}.${rem.toString().padStart(2, '0')}`;
    }

    function describeItem(item) {
      switch (item.type) {
        case 'credit':         return fmt(item.value_cents);
        case 'pick_plus_one':  return '+1 PICK';
        case 'multiplier_2x':  return '2× MULTIPLIER';
        case 'collect':        return 'COLLECT';
        default:               return '?';
      }
    }

    function itemKindClass(item) {
      switch (item.type) {
        case 'credit':         return 'kind-credit';
        case 'pick_plus_one':  return 'kind-plus-one';
        case 'multiplier_2x':  return 'kind-multiplier';
        case 'collect':        return 'kind-collect';
        default:               return '';
      }
    }

    function ariaForDoor(i, item, revealed) {
      if (!revealed) return `Door ${i + 1} of 12, closed`;
      return `Door ${i + 1}: ${describeItem(item)}`;
    }

    function render() {
      $picksLeft.textContent = String(remainingPicks);
      $runTotal.textContent = fmt(runningTotalCents);
      $multBadge.classList.toggle('active', multiplier > 1);

      // Render or update doors.
      if ($grid.children.length === 0) {
        for (let i = 0; i < 12; i++) {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'pm-door';
          btn.setAttribute('role', 'gridcell');
          btn.setAttribute('aria-label', ariaForDoor(i, null, false));
          btn.dataset.idx = String(i);
          btn.innerHTML = `<span class="number">${i + 1}</span><span class="content">?</span>`;
          btn.addEventListener('click', onDoorTap);
          btn.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); onDoorTap(e); }
          });
          $grid.appendChild(btn);
        }
      }
      for (let i = 0; i < 12; i++) {
        const btn = $grid.children[i];
        const slot = slots[i];
        if (slot && slot.picked) {
          btn.classList.add('revealed');
          btn.classList.add(itemKindClass(slot.itemRevealed));
          btn.querySelector('.content').textContent = describeItem(slot.itemRevealed);
          btn.setAttribute('aria-label', ariaForDoor(i, slot.itemRevealed, true));
          btn.classList.add('disabled');
        } else if (roundEnded) {
          btn.classList.add('disabled');
        }
      }
    }

    function announce(msg) {
      $live.textContent = msg;
    }

    // ─── Round logic ─────────────────────────────────────────────────────────
    function onDoorTap(e) {
      if (!doneInit || roundEnded) return;
      const target = e.currentTarget || e.target;
      const idx = Number(target.dataset?.idx ?? target.closest?.('.pm-door')?.dataset.idx);
      if (Number.isNaN(idx)) return;
      if (slots[idx]?.picked) return;
      if (revealIndex >= config.items.length) return;

      // Predetermined reveal sequence: whichever physical door the player
      // tapped now reveals items[revealIndex]. Door choice is presentation.
      const item = config.items[revealIndex];
      revealIndex += 1;
      slots[idx] = { picked: true, itemRevealed: item };
      remainingPicks -= 1;

      // Apply item effect.
      if (item.type === 'credit') {
        runningTotalCents += item.value_cents * multiplier;
      } else if (item.type === 'multiplier_2x') {
        multiplier = 2;
      } else if (item.type === 'pick_plus_one') {
        remainingPicks += 1;
      }

      // Post the event back to the host.
      postToHost({
        type: 'pick_revealed',
        payload: {
          pickIndex: idx,
          itemRevealed: item,
          runningTotalCents,
          currentMultiplier: multiplier,
          remainingPicks,
        },
      });
      announce(`Door ${idx + 1} revealed: ${describeItem(item)}. Total ${fmt(runningTotalCents)}.`);

      // Check end conditions.
      let endReason = null;
      if (item.type === 'collect') {
        endReason = 'collect_revealed';
      } else if (remainingPicks <= 0) {
        endReason = 'picks_exhausted';
      } else if (revealIndex >= config.items.length) {
        endReason = 'all_items_revealed';
      }

      render();

      if (endReason) {
        roundEnded = true;
        completeRound(endReason);
      }
    }

    function completeRound(reason) {
      $completeAmount.textContent = fmt(runningTotalCents);
      $completeReason.textContent = reason.replace(/_/g, ' ');
      $complete.classList.add('show');
      postToHost({
        type: 'round_complete',
        payload: {
          reason,
          totalWinCents: runningTotalCents,
          pickHistory: slots
            .map((s, idx) => s && s.picked ? { pickIndex: idx, itemRevealed: s.itemRevealed } : null)
            .filter(Boolean),
        },
      });
    }

    // ─── Host messaging ─────────────────────────────────────────────────────
    function postToHost(msg) {
      try {
        if (window.parent && window.parent !== window) {
          window.parent.postMessage(msg, '*');
        }
      } catch (_e) { /* noop */ }
    }

    function initFromConfig(cfg) {
      if (doneInit) return;
      config = cfg;
      remainingPicks = cfg.picksAwarded;
      revealIndex = 0;
      runningTotalCents = 0;
      multiplier = 1;
      pickHistory = [];
      slots = Array.from({ length: 12 }, () => ({ picked: false, itemRevealed: null }));
      $title.textContent = (cfg.themeTitle || 'PICK-EM').toUpperCase();
      doneInit = true;
      render();
    }

    window.addEventListener('message', (ev) => {
      const data = ev?.data;
      if (!data || typeof data !== 'object') return;
      if (data.type === 'init' && data.payload) {
        initFromConfig(data.payload);
      }
    });

    // ─── Mock config for standalone testing ─────────────────────────────────
    const MOCK_CONFIG = {
      spinId: 'mock-spin-001',
      themeId: 'lone-star-country',
      picksAwarded: 7,
      betCents: 150,
      items: [
        { type: 'credit', value_cents: 150 },
        { type: 'credit', value_cents: 150 },
        { type: 'multiplier_2x' },
        { type: 'credit', value_cents: 450 },
        { type: 'credit', value_cents: 1500 },
        { type: 'pick_plus_one' },
        { type: 'credit', value_cents: 150 },
        { type: 'collect' },
        { type: 'credit', value_cents: 150 },
        { type: 'credit', value_cents: 450 },
        { type: 'credit', value_cents: 150 },
        { type: 'credit', value_cents: 150 },
      ],
      themeTitle: 'THE BUNKHOUSE',
      audioEnabled: true,
    };

    // Auto-load mock if ?mock=1 OR if no init arrives within 200ms (standalone).
    const params = new URLSearchParams(window.location.search);
    if (params.get('mock') === '1') {
      initFromConfig(MOCK_CONFIG);
    } else {
      setTimeout(() => { if (!doneInit) initFromConfig(MOCK_CONFIG); }, 200);
    }
  })();
  </script>
</body>
</html>
